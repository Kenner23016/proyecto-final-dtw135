<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow — Nuevo Producto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body data-page="formulario-producto" class="app-layout">

  <!-- Formas decorativas de fondo -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-superior">
      <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir o cerrar menú" aria-expanded="true">&lt;</button>
    </div>

    <div class="sidebar-branding">
      <div class="sidebar-brand-row">
        <div class="sidebar-logo">
          <img src="../assets/img/stockFlowLis.png" alt="Logo StockFlow">
        </div>
        <div class="sidebar-marca">
          <h1>StockFlow</h1>
        </div>
      </div>
    </div>

    <nav class="menu-principal">
      <a href="../index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="nav-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Home
      </a>
      <a href="producto-form.html" class="activo">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="nav-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Nuevo producto
      </a>
      <a href="productos.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="nav-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/>
        </svg>
        Productos
      </a>
    </nav>

    <button type="button" class="cerrar-sesion-btn sidebar-logout">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="margin-right:6px">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Cerrar sesión
    </button>
  </aside>

  <main class="contenedor contenedor-formulario">

    <div class="form-page-header">
      <span class="etiqueta">Gestión de inventario</span>
      <h2 id="tituloFormulario">Nuevo producto</h2>
      <p>Complete la información solicitada. Los datos se guardan en localStorage.</p>
    </div>

    <section class="tarjeta dashboard-card form-card">

      <div class="form-section-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/>
        </svg>
        Información del producto
      </div>

      <form id="formProducto">
        <div class="form-grid">
          <div class="campo">
            <label for="codigoInput">Código</label>
            <input type="text" id="codigoInput" placeholder="Ejemplo: P001">
          </div>

          <div class="campo">
            <label for="productoInput">Nombre del producto</label>
            <input type="text" id="productoInput" placeholder="Ejemplo: Cuaderno universitario">
            <p class="contador" style="margin-top: 6px">Caracteres: <span id="contador">0</span></p>
          </div>

          <div class="campo">
            <label for="categoriaInput">Categoría</label>
            <select id="categoriaInput">
              <option value="">Seleccione una categoría</option>
              <option value="Alimentos">Alimentos</option>
              <option value="Limpieza">Limpieza</option>
              <option value="Tecnología">Tecnología</option>
              <option value="Papelería">Papelería</option>
              <option value="Otros">Otros</option>
            </select>
          </div>

          <div class="campo">
            <label for="cantidadInput">Cantidad</label>
            <input type="number" id="cantidadInput" placeholder="Ejemplo: 10" min="0">
          </div>

          <div class="campo">
            <label for="precioInput">Precio unitario</label>
            <input type="number" id="precioInput" placeholder="Ejemplo: 1.50" min="0" step="0.01">
          </div>
        </div>

        <p id="mensajeFormulario" class="mensaje"></p>

        <div class="acciones-formulario" style="margin-top: 24px">
          <button type="submit" id="guardarProductoBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:middle; margin-right:6px">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            Guardar producto
          </button>
          <button type="button" id="limpiarBtn" class="secundario">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:middle; margin-right:6px">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Limpiar
          </button>
          <a href="productos.html" class="boton secundario">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:middle; margin-right:6px">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Volver al listado
          </a>
        </div>
      </form>
    </section>
  </main>

  <script src="../js/app.js"></script>
</body>
</html>
