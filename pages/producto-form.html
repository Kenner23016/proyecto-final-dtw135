<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Producto - Inventario Básico</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="formulario-producto" class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-superior">
      <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir o cerrar menú" aria-expanded="true">&lt;</button>
    </div>

    <div class="sidebar-branding">
      <div class="sidebar-marca">
        <h1>StockFlow</h1>
        <p>Sistema de Gestión de Inventario</p>
      </div>
    </div>

    <nav class="menu-principal">
      <a href="../index.html">Home</a>
      <a href="producto-form.html" class="activo">Nuevo producto</a>
      <a href="productos.html">Productos</a>
    </nav>

    <button type="button" class="cerrar-sesion-btn sidebar-logout">Cerrar sesión</button>
  </aside>

  <main class="contenedor contenedor-formulario">
    <section class="tarjeta">
      <h2 id="tituloFormulario">Nuevo producto</h2>
      <p class="texto-ayuda">
        Complete la información solicitada. Los datos se guardan en localStorage.
      </p>

      <form id="formProducto">
        <div class="form-grid">
          <div class="campo">
            <label for="codigoInput">Código</label>
            <input type="text" id="codigoInput" placeholder="Ejemplo: P001">
          </div>

          <div class="campo">
            <label for="productoInput">Nombre del producto</label>
            <input type="text" id="productoInput" placeholder="Ejemplo: Cuaderno universitario">
            <p class="contador">Caracteres: <span id="contador">0</span></p>
          </div>

          <div class="campo">
            <label for="categoriaInput">Categoría</label>
            <select id="categoriaInput">
              <option value="">Seleccione una categoría</option>
              <option value="Alimentos">Alimentos</option>
              <option value="Limpieza">Limpieza</option>
              <option value="Tecnología">Tecnología</option>
              <option value="Papelería">Papelería</option>
              <option value="Otros">Otros</option>
            </select>
          </div>

          <div class="campo">
            <label for="cantidadInput">Cantidad</label>
            <input type="number" id="cantidadInput" placeholder="Ejemplo: 10" min="0">
          </div>

          <div class="campo">
            <label for="precioInput">Precio unitario</label>
            <input type="number" id="precioInput" placeholder="Ejemplo: 1.50" min="0" step="0.01">
          </div>
        </div>

        <p id="mensajeFormulario" class="mensaje"></p>

        <div class="acciones-formulario">
          <button type="submit" id="guardarProductoBtn">Guardar producto</button>
          <button type="button" id="limpiarBtn" class="secundario">Limpiar</button>
          <a href="productos.html" class="boton claro">Volver al listado</a>
        </div>
      </form>
    </section>
  </main>

  <script src="../js/app.js"></script>
</body>
</html>
