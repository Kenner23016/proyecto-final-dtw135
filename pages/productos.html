<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow</title>
  <link rel="icon" type="image/png" href="../assets/img/stockFlowLis.png">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body data-page="productos" class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-superior">
      <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir o cerrar menú" aria-expanded="true">&lt;</button>
    </div>

    <div class="sidebar-branding">
      <div class="sidebar-brand-row">
        <div class="sidebar-logo">
          <img src="../assets/img/stockFlowLis.png" alt="Logo StockFlow">
        </div>

        <div class="sidebar-marca">
          <h1>StockFlow</h1>
        </div>
      </div>
    </div>

    <nav class="menu-principal">
      <a href="../index.html">Home</a>
      <a href="producto-form.html">Nuevo producto</a>
      <a href="productos.html" class="activo">Productos</a>
      <a href="administracion.html">Administración</a>
    </nav>

    <button type="button" class="cerrar-sesion-btn sidebar-logout">Cerrar sesión</button>
  </aside>

  <main class="contenedor">
    <section class="tarjeta">
      <div class="encabezado-seccion">
        <div>
          <h2>Productos registrados</h2>
          <p>Desde esta vista se consultan, editan y eliminan los productos.</p>
        </div>
        <a href="producto-form.html" class="boton">Agregar producto</a>
      </div>

      <div class="filtros">
        <label for="buscarProducto">Buscar por nombre o código:</label>
        <input type="text" id="buscarProducto" placeholder="Ejemplo: P001 o Cuaderno">
      </div>

      <div class="tabla-contenedor">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Cantidad</th>
              <th>Precio</th>
              <th>Subtotal</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaProductos"></tbody>
        </table>
      </div>

      <p id="mensajeLista" class="mensaje"></p>
    </section>
  </main>

  <script src="../js/app.js"></script>
</body>
</html>
