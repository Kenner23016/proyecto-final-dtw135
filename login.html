<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StockFlow</title>
  <link rel="stylesheet" href="css/login.css">
</head>

<body data-page="login">

  <div class="login-background">
    <video class="login-video" autoplay muted loop playsinline>
      <source src="assets/video/stockflow-bg.mp4" type="video/mp4">
    </video>

    <div class="login-overlay"></div>
  </div>

  <main class="login-page">
    <section class="login-shell">

      <article class="login-brand-panel">

        <img  
          src="assets/img/stockFlowL.png"
          alt="Logo de StockFlow"
          class="login-logo"
        >

        <p class="login-frase">
          Controla tus productos de forma simple, rápida y organizada.
        </p>

        <div class="login-beneficios">
          <span>CRUD de productos</span>
          <span>Dashboard visual</span>
          <span>Gestión local</span>
        </div>
      </article>

      <section class="login-form-panel">
        <div class="login-form-header">
          <h2>Iniciar sesión</h2>
          <p>Ingrese sus credenciales para acceder al panel de inventario.</p>
        </div>

        <form id="formLogin" class="login-form">
          <div class="campo login-campo">
            <label for="loginUsuario">Usuario</label>
            <input 
              type="text" 
              id="loginUsuario" 
              placeholder=""
              autocomplete="username"
            >
          </div>

          <div class="campo login-campo">
            <label for="loginClave">Contraseña</label>
            <input 
              type="password" 
              id="loginClave" 
              placeholder=""
              autocomplete="current-password"
            >
          </div>

          <p id="mensajeLogin" class="mensaje login-mensaje"></p>

          <button type="submit" class="login-submit">
            Ingresar
          </button>
        </form>

      </section>

    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
