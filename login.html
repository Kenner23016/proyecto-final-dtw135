<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Inventario Básico</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="login">

  <main class="contenedor-login">
    <section class="tarjeta login-tarjeta">
      <span class="etiqueta">Sistema de inventario</span>
      <h1>Iniciar sesión</h1>
      <p class="texto-ayuda">Ingrese sus credenciales para acceder al inventario.</p>

      <form id="formLogin">
        <div class="campo">
          <label for="loginUsuario">Usuario</label>
          <input type="text" id="loginUsuario" placeholder="Ejemplo: admin">
        </div>

        <div class="campo">
          <label for="loginClave">Contraseña</label>
          <input type="password" id="loginClave" placeholder="Ejemplo: 1234">
        </div>

        <p id="mensajeLogin" class="mensaje"></p>

        <button type="submit">Entrar</button>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
